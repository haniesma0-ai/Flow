version: '3.8'

services:
  # Frontend React
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: FoxPetroleum-frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    networks:
      - lubriflow-network
    restart: unless-stopped

